html,body{margin:0!important;padding:0!important;width:100%!important;height:100%!important;overflow:hidden!important;background:#000!important;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Noto Sans SC","Noto Sans JP","Noto Sans KR","Segoe UI",Arial,sans-serif!important;touch-action:manipulation}
*{box-sizing:border-box}
.stage{position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;background:#000;overflow:hidden}
.bg,.stage-img{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;display:block;pointer-events:none;user-select:none;-webkit-user-drag:none}
.hot{display:block;text-decoration:none;color:transparent;background:rgba(0,0,0,.001);border:0;-webkit-tap-highlight-color:rgba(255,218,90,.22);touch-action:manipulation}
.hot:active,.hot:focus{outline:.20vw solid rgba(255,226,130,.60);background:rgba(255,215,80,.16)}
.debug-hot .hot{outline:1px solid rgba(255,215,0,.55)!important;background:rgba(255,215,0,.12)!important}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}

.game-hot{
  position:absolute;inset:0;z-index:5;
  display:grid;
  grid-template-rows:12fr 15fr 16fr 14fr 14fr 16fr 13fr;
  grid-template-columns:repeat(12,1fr);
  gap:.56vw;
  padding:1.0vw 1.2vw 1.0vw 1.2vw;
}
.game-back{grid-column:1/3;grid-row:1;border-radius:.9vw}
.top-actions{grid-column:1/13;grid-row:2;display:grid;grid-template-columns:repeat(3,1fr);gap:.72vw}
.member{grid-column:1/13;grid-row:3;display:grid;grid-template-columns:repeat(4,1fr);gap:.62vw}
.free{grid-column:1/13;grid-row:4;display:grid;grid-template-columns:repeat(6,1fr);gap:.52vw}
.cat{grid-column:1/13;grid-row:5;display:grid;grid-template-columns:repeat(7,1fr);gap:.50vw}
.bottom{grid-column:1/13;grid-row:6/8;display:grid;grid-template-columns:repeat(4,1fr);gap:.62vw}
.top-actions .hot,.member .hot,.free .hot,.cat .hot,.bottom .hot{border-radius:.70vw}

<script>
(function(){
  const q = new URLSearchParams(location.search);
  const bodyLang = document.body.getAttribute("data-lang") || q.get("lang") || localStorage.getItem("king_lang") || "zh";
  const langHome = {zh:"zh.html",cn:"cn.html",ja:"ja.html",en:"en.html",ko:"ko.html"};
  const guideFile = {zh:"guide-zh.html",cn:"guide-cn.html",ja:"guide-ja.html",en:"guide-en.html",ko:"guide-ko.html"};
  function rememberLanguage(code){
    try{
      localStorage.setItem("king_lang", code);
      localStorage.setItem("currentLanguage", code);
      localStorage.setItem("king_current_lang", code);
      localStorage.setItem("king_last_second_page", langHome[code] || "zh.html");
      sessionStorage.setItem("king_lang", code);
    }catch(e){}
  }
  rememberLanguage(bodyLang);
  document.querySelectorAll("[data-remember-lang]").forEach(function(a){
    a.addEventListener("click", function(){ rememberLanguage(a.getAttribute("data-remember-lang")); }, {passive:true});
  });
  document.querySelectorAll("[data-card]").forEach(function(a){
    a.addEventListener("click", function(){
      try{
        localStorage.setItem("king_last_card", a.getAttribute("data-card") || "");
        localStorage.setItem("king_last_page", location.pathname.split("/").pop() || "");
      }catch(e){}
    }, {passive:true});
  });
  if(q.get("debugHot")==="1") document.body.classList.add("debug-hot");
})();
</script>
