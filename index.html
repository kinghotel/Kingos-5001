<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="theme-color" content="#050505">
<title>KING HOTEL｜Select Language</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Noto Sans JP","Noto Sans KR",Arial,sans-serif}.stage{position:fixed;inset:0;background:#000;display:grid;place-items:center}.poster{position:relative;width:100vw;height:56.25vw;max-height:100vh;max-width:177.7778vh;background:url('assets/home-landscape-v262.webp') center/contain no-repeat}.hot{position:absolute;display:block;border-radius:1.2vw;text-decoration:none;color:transparent}.hot:focus{outline:3px solid rgba(255,216,93,.9);outline-offset:2px}.clock{position:absolute;left:1.6%;top:2.9%;z-index:5;color:#ffd75b;font-size:2.1vw;font-weight:900;text-shadow:0 0 8px #000,0 0 12px #000;letter-spacing:.04em;white-space:nowrap}.debug{position:absolute;left:1%;right:1%;bottom:1%;z-index:9;color:#fff;background:rgba(0,0,0,.72);border:1px solid rgba(255,216,93,.45);padding:8px 10px;border-radius:8px;font:13px/1.4 monospace;display:none}.show-debug .debug{display:block}.admin-mini{position:absolute;right:1.2%;bottom:1.1%;z-index:5;width:3.2%;height:6.3%;border-radius:50%;background:rgba(0,0,0,.01)}
@media (max-aspect-ratio:16/9){.poster{width:177.7778vh;height:100vh}.clock{font-size:3.7vh}.hot{border-radius:2.1vh}}
/* language buttons based on 16:9 master image */
.ja{left:28.7%;top:42.0%;width:19.6%;height:11.8%}.en{left:49.2%;top:42.0%;width:19.6%;height:11.8%}.ko{left:22.0%;top:55.1%;width:18.0%;height:12.3%}.zh{left:40.5%;top:55.1%;width:18.8%;height:12.3%}.cn{left:59.7%;top:55.1%;width:18.2%;height:12.3%}.info{left:40.3%;top:70.1%;width:24.4%;height:20.0%}.wifi{left:64.8%;top:70.1%;width:15.3%;height:20.0%}.login{left:80.2%;top:70.1%;width:17.5%;height:20.0%}
</style>
</head>
<body>
<main class="stage" id="app">
  <section class="poster" aria-label="KING HOTEL language selection">
    <div class="clock"><span id="nowTime">--:--</span>&nbsp;&nbsp; <span id="weatherTemp">21°C</span></div>
    <a class="hot ja" href="ja.html" aria-label="日本語"></a>
    <a class="hot en" href="en.html" aria-label="English"></a>
    <a class="hot ko" href="ko.html" aria-label="한국어"></a>
    <a class="hot zh" href="zh.html" aria-label="繁體中文"></a>
    <a class="hot cn" href="cn.html" aria-label="简体中文"></a>
    <a class="hot info" href="info.html" aria-label="Hotel Information"></a>
    <a class="hot wifi" href="wifi.html" aria-label="WiFi"></a>
    <a class="hot login" href="admin.html" aria-label="Admin"></a>
    <a class="admin-mini" href="admin.html" aria-label="admin"></a>
    <div class="debug" id="debugBox"></div>
  </section>
</main>
<script>
(function(){
  'use strict';
  var debug=/[?&]debug=1/.test(location.search);
  if(debug) document.body.classList.add('show-debug');
  function log(msg){var b=document.getElementById('debugBox'); if(b) b.textContent += msg+'\n';}
  window.addEventListener('error',function(e){log('ERROR '+(e.message||'')+' '+(e.filename||'')+':'+(e.lineno||''));});
  window.addEventListener('unhandledrejection',function(e){log('PROMISE '+(e.reason&&e.reason.message?e.reason.message:e.reason));});
  function pad(n){return String(n).padStart(2,'0')}
  function tick(){var d=new Date(); var el=document.getElementById('nowTime'); if(el) el.textContent=pad(d.getHours())+':'+pad(d.getMinutes());}
  tick(); setInterval(tick,15000);
  try{localStorage.setItem('king_last_home','index.html');}catch(e){}
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(r){r.update&&r.update();});}).catch(function(){});
  }
})();
</script>
<script src="king-memory-safe-v124.js" defer></script>
</body>
</html>
