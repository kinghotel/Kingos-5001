<script>
(function(){
  var lang="ko";
  var pageMap={zh:"zh.html",cn:"cn.html",ja:"ja.html",en:"en.html",ko:"ko.html"};
  function remember(code){try{localStorage.setItem("king_lang",code);localStorage.setItem("currentLanguage",code);localStorage.setItem("king_current_lang",code);localStorage.setItem("king_last_second_page",pageMap[code]||"zh.html");sessionStorage.setItem("king_lang",code);}catch(e){}}
  remember(lang);
  document.querySelectorAll("[data-lang-go]").forEach(function(a){a.addEventListener("click",function(){remember(a.getAttribute("data-lang-go"));},{passive:true});});
  document.querySelectorAll("[data-card]").forEach(function(a){a.addEventListener("click",function(){try{localStorage.setItem("king_last_card",a.getAttribute("data-card")||"");localStorage.setItem("king_last_page",location.pathname.split("/").pop()||"");}catch(e){}},{passive:true});});
  function setupLiveInfo(){
    var q=new URLSearchParams(location.search);
    var room=q.get("room")||q.get("roomNo")||q.get("room_no");
    try{if(room){localStorage.setItem("king_room",room);sessionStorage.setItem("king_room",room);}room=room||localStorage.getItem("king_room")||sessionStorage.getItem("king_room");}catch(e){}
    if(!room) room="305";
    var roomEl=document.getElementById("kingLiveRoom");
    if(roomEl) roomEl.textContent=room;
    function updateLiveTime(){
      var timeEl=document.getElementById("kingLiveTime");
      if(!timeEl) return;
      try{timeEl.textContent=new Intl.DateTimeFormat("en-GB",{hour:"2-digit",minute:"2-digit",hour12:false,timeZone:"Asia/Tokyo"}).format(new Date());}
      catch(e){var d=new Date(), hh=("0"+d.getHours()).slice(-2), mm=("0"+d.getMinutes()).slice(-2);timeEl.textContent=hh+":"+mm;}
    }
    updateLiveTime();
    setInterval(updateLiveTime,15000);
  }
  setupLiveInfo();
  if(new URLSearchParams(location.search).get("debugHot")==="1") document.body.classList.add("debug-hot");
})();
</script>
