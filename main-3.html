*{box-sizing:border-box}
.stage{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  height:100dvh;
  background:#000!important;

.bg{

  inset:0;

  user-select:none;
  z-index:1;

.sr{

  width:1px;
  height:1px;
  overflow:hidden;

}
.hot{

  -webkit-tap-highlight-color:rgba(255,218,90,.16);
  touch-action:manipulation;
}
.hot:active,.hot:focus{
  outline:1px solid rgba(255,225,135,.20);
  background:rgba(255,215,80,.035);
}
.debug-hot .hot{
  outline:1px solid rgba(255,215,0,.28)!important;
  background:rgba(255,215,0,.045)!important;
}
.home-cardfield{
  position:absolute;
  inset:0;
  z-index:5;

}

<script>
(function(){
  const secondPage = {zh:"zh.html", cn:"cn.html", ja:"ja.html", en:"en.html", ko:"ko.html"};
  const aiPage = {zh:"ai.html?lang=zh&back=zh.html", cn:"ai.html?lang=cn&back=cn.html", ja:"ai.html?lang=ja&back=ja.html", en:"ai.html?lang=en&back=en.html", ko:"ai.html?lang=ko&back=ko.html"};
  function rememberLanguage(code){
    try{
      localStorage.setItem("king_lang", code);
      localStorage.setItem("currentLanguage", code);
      localStorage.setItem("king_current_lang", code);
      localStorage.setItem("king_last_second_page", secondPage[code] || "zh.html");
      sessionStorage.setItem("king_lang", code);
    }catch(e){}
  }
  document.querySelectorAll("[data-remember-lang]").forEach(function(a){
    a.addEventListener("click", function(){ rememberLanguage(a.getAttribute("data-remember-lang")); }, {passive:true});
  });
  document.querySelectorAll("[data-card]").forEach(function(a){
    a.addEventListener("click", function(){
      try{
        localStorage.setItem("king_last_home_card", a.getAttribute("data-card") || "");
        localStorage.setItem("king_last_page", "index.html");
      }catch(e){}
    }, {passive:true});
  });
  const robot = document.querySelector(".home-ai-robot");
  if(robot){
    robot.addEventListener("click", function(){
      let lang="zh";
      try{ lang = localStorage.getItem("king_lang") || localStorage.getItem("currentLanguage") || "zh"; }catch(e){}
      robot.href = aiPage[lang] || aiPage.zh;
    }, {capture:true});
  }

  function updateClock(){
    const el=document.getElementById("homeClock");
    if(!el) return;
    el.textContent=new Intl.DateTimeFormat("en-GB",{hour:"2-digit",minute:"2-digit",hour12:false,timeZone:"Asia/Tokyo"}).format(new Date());
  }
  updateClock();
  setInterval(updateClock,15000);

  const weatherEl=document.getElementById("homeWeather");
  function setWeather(value){
    if(!weatherEl || value==null || Number.isNaN(value)) return;
    const temp=Math.round(Number(value));
    weatherEl.textContent=temp+"°C";
    try{
      localStorage.setItem("king_tokyo_temp_c", String(temp));
      localStorage.setItem("king_tokyo_temp_time", String(Date.now()));
    }catch(e){}
  }
  function loadSavedWeather(){
    try{
      const temp=localStorage.getItem("king_tokyo_temp_c");
      const t=Number(localStorage.getItem("king_tokyo_temp_time") || 0);
      if(temp && Date.now()-t<6*60*60*1000) setWeather(temp);
    }catch(e){}
  }
  async function updateWeather(){
    loadSavedWeather();
    try{
      const url="https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&current=temperature_2m&timezone=Asia%2FTokyo";
      const res=await fetch(url,{cache:"no-store"});
      if(!res.ok) throw new Error("weather fetch failed");
      const data=await res.json();
      setWeather(data && data.current && data.current.temperature_2m);
    }catch(e){}
  }
  updateWeather();
  setInterval(updateWeather,15*60*1000);

  const homeBg = document.querySelector(".bg");
  if(homeBg){
    homeBg.addEventListener("error", function(){
      document.body.classList.add("home-bg-missing");
      const warn=document.createElement("div");
      warn.textContent="KING HOTEL";
      warn.style.cssText="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;color:#f7ca5a;font:900 8vw Arial;letter-spacing:.08em;z-index:2";
      document.body.appendChild(warn);
    }, {once:true});
  }
  window.addEventListener("pageshow", function(){
    document.documentElement.style.background="#000";
    document.body.style.background="#000";
  });

  const q = new URLSearchParams(location.search);
  if(q.get("debugHot")==="1") document.body.classList.add("debug-hot");
})();
</script>

<script id="V5003_MERGE_SAFE_SCRIPT">
(function(){
  const fallback=document.getElementById('v5003Fallback');
  const bg=document.querySelector('.bg');
  function showFallback(){ if(fallback) fallback.classList.add('on'); }
  if(bg){
    if(bg.complete && bg.naturalWidth===0) showFallback();
    bg.addEventListener('error', showFallback, {once:true});
  }
  window.addEventListener('error', function(e){
    const msg=String((e && e.message)||'');
    if(/assets\/|home-landscape|Cannot read|undefined/.test(msg)) showFallback();
  });
})();
</script>
