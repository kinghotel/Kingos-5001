<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>KING OS Direct Open V249</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#ffe29a;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Noto Sans JP","Noto Sans KR",Arial,sans-serif;display:flex;align-items:center;justify-content:center;text-align:center;touch-action:manipulation}
.box{width:min(76vw,880px);border:1px solid rgba(242,196,90,.45);border-radius:22px;padding:28px;background:rgba(0,0,0,.38);box-shadow:0 0 18px rgba(242,196,90,.10)}
h1{margin:0 0 10px;letter-spacing:.12em;font-size:clamp(30px,4.4vw,62px);color:#fff2b8}.status{font-size:clamp(18px,2vw,28px);font-weight:900;color:#ffe29a}.back{position:fixed;left:18px;top:18px;padding:12px 22px;border:1px solid rgba(242,196,90,.55);border-radius:999px;color:#ffe29a;text-decoration:none;font-weight:900;background:rgba(0,0,0,.42)}
</style>
</head>
<body class="king-openlink-page">
<a class="back" href="javascript:history.back()">BACK</a>
<div class="box"><h1>KING HOTEL</h1><div class="status" id="status">正在開啟</div></div>
<script>
(function(){
  var params = new URLSearchParams(location.search);
  var url = params.get('url') || 'index.html';
  var done = false;
  function safeUrl(u){
    if(!u) return 'index.html';
    if(/^https?:\/\//i.test(u)) return u;
    if(/^[a-z0-9_\-\.\/]+(\?.*)?$/i.test(u)) return u;
    return 'index.html';
  }
  url = safeUrl(url);
  function go(){
    if(done) return;
    done = true;
    try{
      if(window.fully && typeof fully.loadUrl === 'function' && /^https?:\/\//i.test(url)){
        fully.loadUrl(url);
        return;
      }
    }catch(e){}
    try{ location.replace(url); }
    catch(e){ location.href = url; }
  }
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(go, 20); });
  if(document.readyState !== 'loading') setTimeout(go, 20);
  setTimeout(go, 160);
})();
</script>
</body>
</html>
