<script>
(function(){
  const q = new URLSearchParams(location.search);
  function normLang(v){
    v = (v || '').toLowerCase();
    const map = {'zh-tw':'zh','zh-hant':'zh','traditional':'zh','tc':'zh','zh-cn':'cn','zh-hans':'cn','sc':'cn','jp':'ja','ja-jp':'ja','kr':'ko','ko-kr':'ko'};
    return map[v] || v;
  }
  const langHome = {zh:'zh.html',cn:'cn.html',ja:'ja.html',en:'en.html',ko:'ko.html'};
  let currentLang = normLang(q.get('lang') || localStorage.getItem('king_lang') || localStorage.getItem('currentLanguage') || 'zh');
  if(!['zh','cn','ja','en','ko'].includes(currentLang)) currentLang = 'zh';
  function rememberLanguage(code){
    code = normLang(code);
    if(!['zh','cn','ja','en','ko'].includes(code)) return;
    try{
      localStorage.setItem('king_lang', code);
      localStorage.setItem('king_selected_lang', code);
      localStorage.setItem('currentLanguage', code);
      localStorage.setItem('king_current_lang', code);
      localStorage.setItem('king_last_second_page', langHome[code] || 'zh.html');
      sessionStorage.setItem('king_lang', code);
    }catch(e){}
  }
  function enc(u){ return 'openlink.html?url=' + encodeURIComponent(u); }
  function searchUrl(mode, qtext){
    if(mode === 'video'){
      if(currentLang === 'cn') return 'https://search.bilibili.com/all?keyword=' + encodeURIComponent(qtext);
      return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(qtext);
    }
    if(currentLang === 'cn') return 'https://www.baidu.com/s?wd=' + encodeURIComponent(qtext);
    if(currentLang === 'ja') return 'https://www.google.com/search?hl=ja&lr=lang_ja&q=' + encodeURIComponent(qtext);
    if(currentLang === 'ko') return 'https://www.google.com/search?hl=ko&lr=lang_ko&q=' + encodeURIComponent(qtext);
    if(currentLang === 'en') return 'https://www.google.com/search?hl=en&q=' + encodeURIComponent(qtext);
    return 'https://www.google.com/search?hl=zh-TW&q=' + encodeURIComponent(qtext);
  }
  rememberLanguage(currentLang);
  document.querySelectorAll('[data-lang]').forEach(a => {
    const code = normLang(a.getAttribute('data-lang'));
    a.addEventListener('click', () => rememberLanguage(code), {passive:true});
  });
  document.querySelectorAll('[data-query-zh]').forEach(a => {
    const qtext = a.getAttribute('data-query-' + currentLang) || a.getAttribute('data-query-en') || a.getAttribute('data-query-zh') || '';
    const mode = a.getAttribute('data-link-mode') || 'search';
    a.href = enc(searchUrl(mode, qtext));
  });
  document.querySelectorAll('[data-card]').forEach(function(a){
    a.addEventListener('click', function(){
      try{
        localStorage.setItem('king_last_card', a.getAttribute('data-card') || '');
        localStorage.setItem('king_last_page', location.pathname.split('/').pop() || '');
      }catch(e){}
    }, {passive:true});
  });
  if(q.get('debugHot')==='1') document.body.classList.add('debug-hot');
})();
</script><script src="assets/king-hot-activate-v247.js"></script>
