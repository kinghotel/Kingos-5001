<script>
(function(){
  const q = new URLSearchParams(location.search);
  function normLang(v){
    v = (v || '').toLowerCase();
    const map = {'zh-tw':'zh','zh-hant':'zh','traditional':'zh','tc':'zh','zh-cn':'cn','zh-hans':'cn','sc':'cn','jp':'ja','ja-jp':'ja','kr':'ko','ko-kr':'ko'};
    return map[v] || v;
  }
  const guideFile = {zh:'guide-zh.html',cn:'guide-cn.html',ja:'guide-ja.html',en:'guide-en.html',ko:'guide-ko.html'};
  const langHome = {zh:'zh.html',cn:'cn.html',ja:'ja.html',en:'en.html',ko:'ko.html'};
  const mapsHL = {zh:'zh-TW',cn:'zh-CN',ja:'ja',en:'en',ko:'ko'};
  let currentLang = normLang(q.get('lang') || localStorage.getItem('king_lang') || localStorage.getItem('currentLanguage') || 'zh');
  if(!['zh','cn','ja','en','ko'].includes(currentLang)) currentLang = 'zh';
  function rememberLanguage(code){
    code = normLang(code);
    if(!['zh','cn','ja','en','ko'].includes(code)) return;
    try{
      localStorage.setItem('king_lang', code);
      localStorage.setItem('king_selected_lang', code);
      localStorage.setItem('currentLanguage', code);
      localStorage.setItem('king_current_lang', code);
      localStorage.setItem('king_last_second_page', langHome[code] || 'zh.html');
      sessionStorage.setItem('king_lang', code);
    }catch(e){}
  }
  function enc(u){ return 'openlink.html?url=' + encodeURIComponent(u); }
  function mapUrl(query){
    const hl = mapsHL[currentLang] || 'zh-TW';
    return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(query) + '&hl=' + encodeURIComponent(hl);
  }
  rememberLanguage(currentLang);
  document.querySelectorAll('[data-remember-lang]').forEach(function(a){
    a.addEventListener('click', function(){ rememberLanguage(a.getAttribute('data-remember-lang')); }, {passive:true});
  });
  document.querySelectorAll('[data-map-lang]').forEach(function(a){
    const code = normLang(a.getAttribute('data-map-lang'));
    a.href = 'tokyo-map.html?lang=' + code;
  });
  document.querySelectorAll('[data-back-guide]').forEach(function(a){
    a.href = guideFile[currentLang] || 'guide-zh.html';
  });
  document.querySelectorAll('[data-map-query]').forEach(function(a){
    const qtext = a.getAttribute('data-query-' + currentLang) || a.getAttribute('data-query-en') || a.getAttribute('data-query-zh') || 'Tokyo';
    a.href = enc(mapUrl(qtext));
  });
  document.querySelectorAll('[data-card]').forEach(function(a){
    a.addEventListener('click', function(){
      try{
        localStorage.setItem('king_last_card', a.getAttribute('data-card') || '');
        localStorage.setItem('king_last_page', location.pathname.split('/').pop() || '');
      }catch(e){}
    }, {passive:true});
  });
  if(q.get('debugHot')==='1') document.body.classList.add('debug-hot');
})();
</script><script src="assets/king-hot-activate-v247.js"></script>
