(function(){
  var q=new URLSearchParams(location.search);
  var lang=q.get('lang') || localStorage.getItem('king_lang') || localStorage.getItem('currentLanguage') || 'zh';
  var mode=document.body.getAttribute('data-search-mode') || 'search';
  try{localStorage.setItem('king_lang',lang);localStorage.setItem('currentLanguage',lang);localStorage.setItem('king_last_page','tokyo-planner.html');}catch(e){}
  document.querySelectorAll('[data-lang]').forEach(function(a){
    a.addEventListener('click',function(){try{localStorage.setItem('king_lang',a.getAttribute('data-lang'));localStorage.setItem('currentLanguage',a.getAttribute('data-lang'));}catch(e){}},{passive:true});
  });
  function pickQuery(a){return a.getAttribute('data-query-'+lang)||a.getAttribute('data-query-zh')||a.textContent.trim();}
  function searchUrl(query){
    if(mode==='video'){
      if(lang==='cn') return 'https://search.bilibili.com/all?keyword=' + encodeURIComponent(query);
      return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(query);
    }
    if(lang==='cn') return 'https://www.baidu.com/s?wd=' + encodeURIComponent(query);
    if(lang==='ja') return 'https://search.yahoo.co.jp/search?p=' + encodeURIComponent(query);
    if(lang==='ko') return 'https://search.naver.com/search.naver?query=' + encodeURIComponent(query);
    if(lang==='en') return 'https://www.google.com/search?hl=en&q=' + encodeURIComponent(query);
    return 'https://www.google.com/search?hl=zh-TW&q=' + encodeURIComponent(query);
  }
  document.querySelectorAll('.card').forEach(function(a){
    var query=pickQuery(a);
    a.href='openlink.html?url=' + encodeURIComponent(searchUrl(query));
    a.addEventListener('click',function(){try{localStorage.setItem('king_last_card',a.getAttribute('data-card')||'');localStorage.setItem('king_last_page','tokyo-planner.html');}catch(e){}},{passive:true});
  });
  if(q.get('debugHot')==='1') document.body.classList.add('debug-hot');
})();
</script></body></html>
