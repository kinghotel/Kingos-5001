    a.addEventListener('click', function(){ rememberLanguage(a.getAttribute('data-remember-lang')); }, {passive:true});
  });
  document.querySelectorAll('[data-search-section]').forEach(function(a){
    var query=a.getAttribute('data-query-'+lang)||a.getAttribute('data-query-zh')||'';
    var section=a.getAttribute('data-search-section')||'';
    a.href=engine(section, lang, query);
  });
  var footerTargets={
    news: function(){return 'news-'+lang+'.html';},
    weather: function(){var map={zh:'東京天氣',cn:'东京天气',ja:'東京 天気',en:'Tokyo weather',ko:'도쿄 날씨'}; return engine('food', lang, map[lang]||'Tokyo weather');},
    transport: function(){return 'tokyo-transport.html?lang='+lang;},
    spots: function(){return guideFile[lang]||'guide-zh.html';},
    maps: function(){return openUrl('https://www.google.com/maps/search/Tokyo+tourist+spots');}
  };
  document.querySelectorAll('[data-footer]').forEach(function(a){var k=a.getAttribute('data-footer'); if(footerTargets[k]) a.href=footerTargets[k]();});
  document.querySelectorAll('[data-action="back"]').forEach(function(a){a.href=guideFile[lang]||'guide-zh.html';});
  document.querySelectorAll('[data-action="ai"]').forEach(function(a){a.href='ai.html?lang='+encodeURIComponent(lang)+'&back='+encodeURIComponent(file+'?lang='+lang);});
  document.querySelectorAll('[data-card]').forEach(function(a){a.addEventListener('click',function(){try{localStorage.setItem('king_last_card',a.getAttribute('data-card')||'');localStorage.setItem('king_last_page',file);}catch(e){}},{passive:true});});
  if(q.get('debugHot')==='1') document.body.classList.add('debug-hot');
})();

<script id="king-v310-grid-hotspot-fallback">
(function(){
  if(window.KING_V310_GRID_HOTSPOT_FALLBACK) return;
  window.KING_V310_GRID_HOTSPOT_FALLBACK = true;
  function pct(e){
    var t=(e.changedTouches&&e.changedTouches[0])||e;
    return {x:(t.clientX/window.innerWidth)*100,y:(t.clientY/window.innerHeight)*100};
  }
  var cols=[{l:.55,r:20.10},{l:20.0,r:39.35},{l:39.35,r:58.70},{l:58.70,r:78.05},{l:78.05,r:99.40}];
  var rows=[{t:20.85,b:34.90},{t:35.05,b:49.10},{t:49.25,b:63.30},{t:63.45,b:77.50},{t:77.65,b:91.70}];
  function findCell(x,y){
    var c=-1,r=-1;
    for(var i=0;i<cols.length;i++){ if(x>=cols[i].l && x<=cols[i].r){c=i;break;} }
    for(var j=0;j<rows.length;j++){ if(y>=rows[j].t && y<=rows[j].b){r=j;break;} }
    return c>=0&&r>=0?{c:c,r:r}:null;
  }
  function go(a){
    if(!a||!a.href) return;
    try{localStorage.setItem('king_last_card',a.getAttribute('data-card')||'');localStorage.setItem('king_last_page',location.pathname.split('/').pop()||'');}catch(e){}
    window.location.href=a.href;
  }
  function handle(e){
    if(e.target && e.target.closest && e.target.closest('a.hot')) return;
    var p=pct(e), cell=findCell(p.x,p.y);
    if(!cell) return;
    var a=document.querySelector('.card-col-'+cell.c+'.card-row-'+cell.r);
    if(!a) return;
    e.preventDefault();
    e.stopPropagation();
    go(a);
  }
  document.addEventListener('pointerup',handle,true);
  document.addEventListener('touchend',handle,true);
  document.addEventListener('click',handle,true);
  if(new URLSearchParams(location.search).get('debugHot')==='1') document.body.classList.add('debug-hot');
})();
</script>
